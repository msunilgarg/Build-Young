<!doctype html>
<!-- Source for public/og-image.png (1200×630 social/link-preview card).
     Edit this, then run scripts/render-og-image.sh to regenerate the PNG.
     Copy MUST stay consistent with index.html's OG meta + POSITIONING.md. -->
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#242424; --ink2:#424242; --muted:#605e5c;
    --blue:#0067b8; --blueLite:#0078d4; --blueSky:#50a0e0;
    --teal:#0a7d85; --green:#178045; --purple:#5c2e91; --paper:#faf9f8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1200px;height:630px;}
  body{
    background:var(--paper);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    color:var(--ink);
    border-top:10px solid var(--blue);
    padding:84px 92px;
    display:flex;flex-direction:column;justify-content:center;
  }
  .brand{display:flex;align-items:center;gap:22px;margin-bottom:40px;}
  .mark{width:104px;height:104px;flex:0 0 auto;}
  .word{font-family:"Space Grotesk","Inter",sans-serif;font-weight:700;font-size:84px;letter-spacing:-.02em;line-height:1;}
  .word .y{
    background:linear-gradient(95deg,var(--blue) 0%,var(--teal) 48%,var(--green) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;
  }
  .headline{font-family:"Space Grotesk","Inter",sans-serif;font-weight:700;font-size:52px;letter-spacing:-.02em;line-height:1.06;color:var(--ink);margin-bottom:26px;max-width:1020px;}
  .sub{font-size:30px;font-weight:600;line-height:1.34;color:var(--ink2);max-width:1000px;margin-bottom:42px;}
  .row{display:flex;align-items:center;justify-content:space-between;}
  .pill{display:inline-block;background:var(--purple);color:#fff;font-weight:700;font-size:26px;padding:14px 26px;border-radius:12px;letter-spacing:-.01em;}
  .domain{font-weight:700;font-size:26px;color:var(--muted);}
</style>
</head>
<body>
  <div class="brand">
    <svg class="mark" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <g transform="translate(14,12)">
        <rect x="0"  y="22" width="9.5" height="14" rx="2" fill="#50a0e0"/>
        <rect x="13" y="13" width="9.5" height="23" rx="2" fill="#0078d4"/>
        <rect x="26" y="1"  width="9.5" height="35" rx="2" fill="#0067b8"/>
        <path d="M31 -5 l4 5 h-8 z" fill="#038387"/>
      </g>
    </svg>
    <div class="word">Build <span class="y">Young</span></div>
  </div>

  <div class="headline">Hands-on AI for high schoolers</div>
  <div class="sub">Build a real product with AI, take it live, grow it, and go get your first customers.</div>

  <div class="row">
    <span class="pill">Raising builders, not consumers</span>
    <span class="domain">build-young.com</span>
  </div>
</body>
</html>
