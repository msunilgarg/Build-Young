  <script>
  /* Persistence shim: provides the window.storage API the app expects,
     backed by localStorage so student progress survives refreshes.
     Falls back to in-memory if localStorage is unavailable. */
  (function () {
    var mem = {};
    function ok() { try { var k = "__by__"; localStorage.setItem(k, "1"); localStorage.removeItem(k); return true; } catch (e) { return false; } }
    var useLS = ok();
    function read(k) { return useLS ? localStorage.getItem(k) : (k in mem ? mem[k] : null); }
    function write(k, v) { if (useLS) localStorage.setItem(k, v); else mem[k] = v; }
    function del(k) { if (useLS) localStorage.removeItem(k); else delete mem[k]; }
    window.storage = {
      get: function (key) { var v = read(key); return Promise.resolve(v === null ? null : { key: key, value: v }); },
      set: function (key, value) { write(key, String(value)); return Promise.resolve({ key: key, value: String(value) }); },
      delete: function (key) { del(key); return Promise.resolve({ key: key, deleted: true }); },
      list: function (prefix) {
        var keys = [];
        if (useLS) { for (var i = 0; i < localStorage.length; i++) { var kk = localStorage.key(i); if (!prefix || kk.indexOf(prefix) === 0) keys.push(kk); } }
        else { keys = Object.keys(mem); }
        return Promise.resolve({ keys: keys });
      }
    };
  })();
  </script>

      <h1>Build Young — financial literacy, learned by living it</h1>
      <p><strong>Raising builders, not consumers.</strong></p>
      <p>Build Young is a live, hands-on program for teenagers (ages 13–18) that teaches them to build economic value — getting money-savvy as the foundation, then growing it and creating something other people will pay for. Students earn a simulated paycheck every class, set up their finances, invest through real-world market swings, buy and finance a home and a car, manage credit and a budget, launch a build of their own, and graduate having built a net worth from zero. Financial literacy is the foundation; building value is the point. Classes run live online over Zoom across 12 weekly sessions plus 6 monthly check-ins.</p>
      <h2>Two tracks</h2>

        <li>Middle School cohort — $599</li>
        <li>High School cohort — $799 (adds a Paying for College unit: financial aid and student loans)</li>
